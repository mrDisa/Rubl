<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Ruble - Регистрация</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'feed/feed.css' %}" />
    <style>
      .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100%;
      }
      .auth-card {
        background: rgba(21, 21, 26, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
      }
      .auth-card h2 {
        font-weight: 300;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 8px;
        margin-left: 15px;
      }
      .auth-input {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-color);
        border-radius: 30px;
        padding: 12px 20px;
        color: white;
        outline: none;
        font-family: inherit;
        transition: 0.3s;
      }
      .auth-input:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .btn-register {
        width: 100%;
        background: white;
        color: black;
        border: none;
        padding: 14px;
        border-radius: 30px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }
      .btn-register:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }
      .auth-footer {
        margin-top: 20px;
        font-size: 13px;
        color: var(--text-muted);
      }
      .auth-footer a {
        color: white;
        text-decoration: none;
      }
      /* Блок для показа ошибок */
      #error-message {
        color: #ff4d4f;
        font-size: 13px;
        margin-top: 15px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo" style="margin: 0 0 20px 0; text-align: center">
          Ruble
        </div>
        <h2>Создать аккаунт</h2>

        <form id="registerForm">
          <div class="form-group">
            <label>Имя пользователя</label>
            <input
              type="text"
              name="username"
              class="auth-input"
              placeholder="@username"
              required
            />
          </div>

          <div class="form-group">
            <label>Ваше имя</label>
            <input
              type="text"
              name="first_name"
              class="auth-input"
              placeholder="Например: Иван"
              required
            />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              name="email"
              class="auth-input"
              placeholder="hello@ruble.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Пароль</label>
            <input
              type="password"
              name="password"
              class="auth-input"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-register">Зарегистрироваться</button>
          <div id="error-message">Ошибка при регистрации</div>
        </form>

        <div class="auth-footer">
          Уже есть аккаунт? <a href="/login/">Войти</a>
        </div>
      </div>
    </div>

    <script>
      // Функция для получения скрытого токена безопасности Django (CSRF)
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
          const cookies = document.cookie.split(";");
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + "=") {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1),
              );
              break;
            }
          }
        }
        return cookieValue;
      }

      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          // Собираем данные из формы (теперь тут есть username, first_name, email и password)
          const formData = new FormData(this);
          const data = Object.fromEntries(formData.entries());
          const errorMsg = document.getElementById("error-message");

          // Точный URL API твоего бэкенда
          const apiUrl = "/api/v1/users/register/";

          // Получаем токен из куки
          const csrftoken = getCookie("csrftoken");

          // Скрываем предыдущую ошибку при новой попытке
          errorMsg.style.display = "none";

          try {
            const response = await fetch(apiUrl, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken,
              },
              body: JSON.stringify(data),
            });

            if (response.ok) {
              // Регистрация прошла успешно!
              window.location.href = "/feed/"; // Поменяй путь, если нужно отправить на логин
            } else {
              const errorData = await response.json();
              errorMsg.style.display = "block";
              errorMsg.textContent = Object.values(errorData).flat().join(", ");
            }
          } catch (error) {
            console.error("Ошибка:", error);
            errorMsg.style.display = "block";
            errorMsg.textContent =
              "Ошибка соединения с сервером. Проверьте терминал.";
          }
        });
    </script>
  </body>
</html>
