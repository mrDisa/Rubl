<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruble - Профиль</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'feed/feed.css' %}" />
    <script src="{% static 'feed/utils.js' %}" defer></script>
    <script src="{% static 'users/profile.js' %}" defer></script>
    <style>
      input[type="file"]::file-selector-button {
        background: #ffffff;
        color: #000000;
        border: none;
        padding: 8px 16px;
        border-radius: 10px;
        cursor: pointer;
        margin-right: 12px;
        font-family: inherit;
        font-weight: 600;
        transition: 0.2s ease;
      }
      input[type="file"]::file-selector-button:hover {
        background: #e6e6e6;
      }
      .sidebar-left {
        display: flex;
        flex-direction: column;
        align-items: flex-end !important;
        padding-right: 32px !important;
        box-sizing: border-box;
      }
      /* Стили для скроллбара подписчиков */
      #followers-list::-webkit-scrollbar {
        width: 6px;
      }
      #followers-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #followers-list::-webkit-scrollbar-thumb {
        background: #2a2a35;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar-left">
        <a
          href="/feed/"
          style="text-decoration: none; color: inherit; outline: none"
        >
          <div class="logo" style="margin-bottom: 32px">Ruble</div>
        </a>

        <div
          style="
            margin-bottom: auto;
            width: 100%;
            display: flex;
            justify-content: flex-end;
          "
        >
          <div class="nav-pill">
            <a href="/feed/" style="display: contents">
              <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 3L4 9v12h5v-7h6v7h5V9z" />
              </svg>
            </a>

            <a href="#" id="open-notifications-btn" style="display: contents">
              <div
                style="
                  position: relative;
                  display: inline-flex;
                  justify-content: center;
                  align-items: center;
                  cursor: pointer;
                "
              >
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <path
                    d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
                  />
                </svg>
                <div
                  id="notifications-badge"
                  style="
                    display: none;
                    position: absolute;
                    top: -2px;
                    right: -2px;
                    width: 10px;
                    height: 10px;
                    background: #ff4d4f;
                    border-radius: 50%;
                    border: 2px solid #1c1c22;
                  "
                ></div>
              </div>
            </a>
          </div>
        </div>

        <div style="position: relative; margin-top: auto">
          <div
            id="user-menu-btn"
            class="user-profile"
            style="
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 8px;
            "
          >
            <div class="user-details" style="text-align: right">
              <div
                class="user-name"
                id="current-username"
                style="font-weight: 600"
              >
                Загрузка...
              </div>
              <div
                class="user-tag"
                id="current-usertag"
                style="color: #8b8b9b; font-size: 13px"
              >
                @...
              </div>
            </div>
            <div
              class="avatar"
              id="current-avatar"
              style="
                background: #ffffff;
                color: #000000;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
              "
            >
              ?
            </div>
          </div>

          <div
            id="user-dropdown"
            style="
              display: none;
              position: absolute;
              bottom: calc(100% + 12px);
              right: 0;
              background: #1c1c22;
              border: 1px solid #2a2a35;
              border-radius: 16px;
              width: 180px;
              padding: 8px;
              flex-direction: column;
              gap: 4px;
              box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
              z-index: 100;
            "
          >
            <a
              href="#"
              id="dropdown-profile-link"
              style="
                padding: 10px 14px;
                color: #fff;
                text-decoration: none;
                border-radius: 10px;
                transition: 0.2s;
                font-size: 14px;
              "
              onmouseover="this.style.background = '#2a2a35'"
              onmouseout="this.style.background = 'transparent'"
              >Перейти в профиль</a
            >
            <div
              id="dropdown-logout-btn"
              style="
                padding: 10px 14px;
                color: #ff4d4f;
                cursor: pointer;
                border-radius: 10px;
                transition: 0.2s;
                font-size: 14px;
              "
              onmouseover="this.style.background = '#2a2a35'"
              onmouseout="this.style.background = 'transparent'"
            >
              Выйти из аккаунта
            </div>
          </div>
        </div>
      </aside>

      <main class="feed">
        <div
          class="profile-header"
          style="
            background: #ffffff05;
            padding: 40px;
            border-radius: 24px;
            margin-bottom: 0;
            text-align: center;
            border: 1px solid #ffffff0d;
          "
        >
          <div
            id="profile-avatar-big"
            class="avatar"
            style="
              width: 100px;
              height: 100px;
              font-size: 40px;
              margin: 0 auto 20px;
              background: #ffffff;
              color: #000000;
              overflow: hidden;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            ?
          </div>
          <h1 id="profile-name" style="margin-bottom: 8px">...</h1>
          <p
            id="profile-job"
            style="
              color: #8b8b9b;
              margin-bottom: 16px;
              font-weight: 500;
              font-size: 14px;
            "
          >
            ...
          </p>
          <p
            id="profile-bio"
            style="
              color: #cccccc;
              font-size: 14px;
              max-width: 500px;
              margin: 0 auto 24px;
              line-height: 1.6;
            "
          >
            ...
          </p>

          <div
            style="
              display: flex;
              justify-content: center;
              gap: 40px;
              color: #8b8b9b;
              font-size: 13px;
              text-transform: uppercase;
            "
          >
            <div>
              <b
                id="posts-count"
                style="
                  color: #ffffff;
                  font-size: 1.4em;
                  display: block;
                  margin-bottom: 4px;
                "
                >0</b
              >
              постов
            </div>
            <div
              id="followers-btn"
              style="cursor: pointer; transition: 0.2s"
              onmouseover="this.style.opacity = '0.7'"
              onmouseout="this.style.opacity = '1'"
            >
              <b
                id="followers-count"
                style="
                  color: #ffffff;
                  font-size: 1.4em;
                  display: block;
                  margin-bottom: 4px;
                "
                >0</b
              >
              рубликов
            </div>
          </div>

          <div
            style="
              display: flex;
              justify-content: center;
              gap: 12px;
              margin-top: 24px;
            "
          >
            <button
              id="edit-profile-btn"
              style="
                display: none;
                width: 100%;
                max-width: 280px;
                height: 48px;
                background: #ffffff;
                color: #000000;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 600;
                font-size: 15px;
                transition: 0.2s;
              "
            >
              Редактировать профиль
            </button>
            <button
              id="follow-btn"
              style="
                display: none;
                width: 100%;
                max-width: 280px;
                height: 48px;
                background: #ffffff;
                color: #000000;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 600;
                font-size: 15px;
                transition: 0.2s;
              "
            >
              Подписаться
            </button>
          </div>
        </div>

        <h2
          style="
            margin: 12px 0 4px 0;
            font-weight: 600;
            font-size: 16px;
            opacity: 0.8;
            letter-spacing: 1px;
            text-transform: uppercase;
          "
        >
          ПУБЛИКАЦИИ
        </h2>

        <div
          id="user-posts-container"
          style="display: flex; flex-direction: column; gap: 16px"
        ></div>
        <div id="profile-feed-end" class="feed-end" style="margin-top: 24px">
          Загрузка...
        </div>
      </main>

      <aside class="sidebar-right"></aside>
    </div>

    <div
      id="edit-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000d9;
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: #1c1c22;
          padding: 40px;
          border-radius: 24px;
          width: 90%;
          max-width: 450px;
          border: 1px solid #2a2a35;
        "
      >
        <h2 style="margin-bottom: 24px; text-align: center; font-weight: 600">
          Настройки профиля
        </h2>
        <form id="edit-profile-form">
          <input
            type="text"
            id="edit-firstname"
            placeholder="Имя"
            style="
              width: 100%;
              background: #2a2a35;
              border: 1px solid #333333;
              padding: 14px;
              border-radius: 12px;
              color: #ffffff;
              margin-bottom: 16px;
              outline: none;
            "
          />
          <textarea
            id="edit-bio"
            placeholder="О себе"
            rows="3"
            style="
              width: 100%;
              background: #2a2a35;
              border: 1px solid #333333;
              padding: 14px;
              border-radius: 12px;
              color: #ffffff;
              margin-bottom: 16px;
              outline: none;
              font-family: inherit;
              resize: none;
            "
          ></textarea>
          <input
            type="text"
            id="edit-job"
            placeholder="Работа"
            style="
              width: 100%;
              background: #2a2a35;
              border: 1px solid #333333;
              padding: 14px;
              border-radius: 12px;
              color: #ffffff;
              margin-bottom: 16px;
              outline: none;
            "
          />
          <input
            type="file"
            id="edit-avatar-input"
            accept="image/*"
            style="
              margin-bottom: 30px;
              color: #8b8b9b;
              font-size: 13px;
              width: 100%;
              outline: none;
            "
          />
          <div style="display: flex; gap: 16px">
            <button
              type="submit"
              style="
                flex: 2;
                margin: 0;
                height: 48px;
                background: #ffffff;
                color: #000000;
                border: none;
                border-radius: 12px;
                font-weight: 600;
                font-size: 15px;
                cursor: pointer;
              "
            >
              Сохранить
            </button>
            <button
              type="button"
              id="close-modal"
              style="
                flex: 1;
                background: transparent;
                color: #8b8b9b;
                border: 1px solid #333333;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 500;
                font-size: 15px;
              "
            >
              Отмена
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="followers-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000d9;
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: #1c1c22;
          padding: 32px;
          border-radius: 24px;
          width: 90%;
          max-width: 400px;
          border: 1px solid #2a2a35;
          max-height: 80vh;
          display: flex;
          flex-direction: column;
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
          "
        >
          <h2 style="font-weight: 600; margin: 0">Подписчики</h2>
          <button
            id="close-followers"
            style="
              background: transparent;
              border: none;
              color: #8b8b9b;
              cursor: pointer;
            "
          >
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
              />
            </svg>
          </button>
        </div>
        <div
          id="followers-list"
          style="
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
          "
        ></div>
      </div>
    </div>

    <div
      id="notifications-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000d9;
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: #1c1c22;
          padding: 32px;
          border-radius: 24px;
          width: 90%;
          max-width: 400px;
          border: 1px solid #2a2a35;
          max-height: 80vh;
          display: flex;
          flex-direction: column;
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
          "
        >
          <h2 style="font-weight: 600; margin: 0">Уведомления</h2>
          <button
            id="close-notifications"
            style="
              background: transparent;
              border: none;
              color: #8b8b9b;
              cursor: pointer;
            "
          >
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
              />
            </svg>
          </button>
        </div>
        <div
          id="notifications-list"
          style="
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
          "
        ></div>
      </div>
    </div>
  </body>
</html>
