<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Ruble - Вход</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'feed/feed.css' %}" />
    <style>
      .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100%;
      }
      .auth-card {
        background: rgba(21, 21, 26, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
      }
      .auth-card h2 {
        font-weight: 300;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 8px;
        margin-left: 15px;
      }
      .auth-input {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-color);
        border-radius: 30px;
        padding: 12px 20px;
        color: white;
        outline: none;
        font-family: inherit;
        transition: 0.3s;
      }
      .auth-input:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .btn-login {
        width: 100%;
        background: white;
        color: black;
        border: none;
        padding: 14px;
        border-radius: 30px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }
      .btn-login:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }
      .auth-footer {
        margin-top: 20px;
        font-size: 13px;
        color: var(--text-muted);
      }
      .auth-footer a {
        color: white;
        text-decoration: none;
      }
      #error-message {
        color: #ff4d4f;
        font-size: 13px;
        margin-top: 15px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo" style="margin: 0 0 20px 0; text-align: center">
          Ruble
        </div>
        <h2>С возвращением</h2>

        <form id="loginForm">
          <div class="form-group">
            <label>Имя пользователя</label>
            <input
              type="text"
              name="username"
              class="auth-input"
              placeholder="@username"
              required
            />
          </div>

          <div class="form-group">
            <label>Пароль</label>
            <input
              type="password"
              name="password"
              class="auth-input"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-login">Войти</button>
          <div id="error-message">Неверный логин или пароль</div>
        </form>

        <div class="auth-footer">
          Нет аккаунта? <a href="/signup/">Создать</a>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const data = Object.fromEntries(formData.entries());
          const errorMsg = document.getElementById("error-message");

          // API URL для получения JWT токена
          const tokenUrl = "/api/v1/token/";

          try {
            const response = await fetch(tokenUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            if (response.ok) {
              const tokens = await response.json();
              localStorage.setItem("access_token", tokens.access);
              localStorage.setItem("refresh_token", tokens.refresh);

              // Уходим в ленту по красивому адресу
              window.location.href = "/feed/";
            } else {
              errorMsg.style.display = "block";
              errorMsg.textContent = "Неверный логин или пароль";
            }
          } catch (error) {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Ошибка сервера";
          }
        });
    </script>
  </body>
</html>
